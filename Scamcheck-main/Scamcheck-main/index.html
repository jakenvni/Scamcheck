<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamCheck</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <main class="container">

        <h1>ScamCheck</h1>

        <p class="subtitle">
            Kiểm tra nhanh tin nhắn nghi ngờ lừa đảo
        </p>

        <textarea id="messageInput" placeholder="Dán nội dung tin nhắn vào đây..."></textarea>

        <button id="checkBtn">
            Kiểm tra
        </button>

<div class="result-box" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: #fff; border-radius: 8px;">
    <p style="font-size: 18px;"><strong>Nội dung:</strong> <span id="display-input-text">Chưa có tin nhắn</span></p>
    <p style="font-size: 18px;"><strong>Mức độ rủi ro:</strong> <span id="risk-level-badge" style="color: red; font-weight: bold;">Chưa xác định</span></p>
</div>
        <h3 style="font-size: 22px; color: #111; margin-top: 25px;">🕒 Lịch sử kiểm tra gần đây</h3>
        <div id="history-list"></div>

    </main>

    <script src="js/storage.js"></script>
    <script src="js/gemini.js"></script>
    <script src="js/ui.js"></script>

</body>
</html>
